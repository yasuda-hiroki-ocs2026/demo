<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>天気 Hit&Blow</title>
    <link rel="stylesheet" href="/css/battle.css">
</head>
<body>

<div class="game-layout">

    <div class="container">

        <h1>🌤 天気 Hit&Blow</h1>

        <div class="weather-box" id="weather">
            読み込み中...
        </div>

        <div class="select-group">
            <label>地方</label>
            <select id="region">
                <option>北海道</option>
                <option>東北</option>
                <option>関東</option>
                <option>中部</option>
                <option>関西</option>
                <option>九州</option>
            </select>
        </div>

        <div class="select-group">
            <label>月</label>
            <select id="month">
                <option value="3">3月</option>
                <option value="4">4月</option>
                <option value="9">9月</option>
                <option value="10">10月</option>
            </select>
        </div>

        <div class="select-group">
            <label>天気タイプ</label>
            <select id="type">
                <option>晴れ型</option>
                <option>雨型</option>
                <option>変動型</option>
                <option>荒天型</option>
            </select>
        </div>

        <button onclick="submitAnswer()">
            回答する
        </button>

    </div>

    <div class="side-panel">

        <div id="result">結果待ち</div>

        <div id="count">挑戦回数: 0</div>

        <div id="history"></div>

        <button onclick="nextGame()" id="nextButton">
            次の問題へ
        </button>

    </div>

</div>

<script src="/js/battle.js"></script>

</body>
</html>
